volumes:
  authentik_postgres_data:
  authentik_media:
  dynamodb_data:

networks:
  confidant:
    name: confidant
services:
  authentik-postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.1
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: confidant-dev-secret-change-in-production
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
      AUTHENTIK_BOOTSTRAP_PASSWORD: devpassword
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/data
      - ./.config/dev/authentik/blueprints:/blueprints/custom:ro
    ports:
      - "9000:9000"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/lifecycle/ak", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - default
      - confidant
  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    restart: unless-stopped
    command: worker
    user: root
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: confidant-dev-secret-change-in-production
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/data
      - ./.config/dev/authentik/blueprints:/blueprints/custom:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    networks:
      - default
  dynamodb:
    build:
      context: .compose/dynamodb
    init: true
    restart: on-failure
    env_file: ./config/development/dynamodb.env
    command:
      - -Xmx512m
      - -jar
      - DynamoDBLocal.jar
      - -port
      - "8080"
      - -sharedDb
      - -dbPath
      - /home/dynamodblocal/data
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/"]
      interval: 5s
      timeout: 2s
      retries: 5
  kms:
    image: nsmithuk/local-kms
    init: true
    restart: on-failure
    env_file: ./config/development/kms.env
    volumes:
      - ./config/development/kms-seed.yaml:/init/seed.yaml
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 5s
      timeout: 2s
      retries: 5
  confidant:
    build:
      context: .
      dockerfile: Dockerfile
    image: mappedsky/confidant
    init: true
    restart: on-failure
    networks:
      - default
      - confidant
    ports:
      - "80:80"
    depends_on:
      dynamodb:
        condition: service_healthy
      kms:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    env_file: ./config/development/confidant.env
    volumes:
      - .:/srv/confidant
      - ./config/development/logging.conf:/etc/confidant/logging.conf
      - ./config/gunicorn.conf:/etc/confidant/gunicorn.conf
    command: "gunicorn --config /etc/confidant/gunicorn.conf confidant.wsgi:app --workers=2 -k gevent --reload --no-control-socket --access-logfile=- --error-logfile=-"
  frontend:
    image: oven/bun:latest
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
    depends_on:
      - confidant
    command: "bun run dev"
    networks:
      - default
      - confidant
