version: 1
metadata:
  name: Confidant Development OIDC Provider
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_core.user
    state: present
    identifiers:
      username: akadmin
    attrs:
      password: devpassword

  - model: authentik_core.group
    state: present
    identifiers:
      name: confidant-user
    attrs:
      name: confidant-user

  - model: authentik_core.group
    state: present
    identifiers:
      name: confidant-service
    attrs:
      name: confidant-service

  - model: authentik_core.user
    state: present
    identifiers:
      username: developer
    attrs:
      name: Developer
      email: developer@localhost
      is_active: true
      password: devpassword
      groups:
        - !Find [authentik_core.group, [name, confidant-user]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: confidant-development
    attrs:
      name: Confidant Development Service
      email: confidant-development@localhost
      is_active: true
      password: devpassword
      groups:
        - !Find [authentik_core.group, [name, confidant-service]]

  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      managed: confidant.dev/providers/oauth2/scope-principal-type
    attrs:
      name: Confidant Principal Type
      scope_name: openid
      expression: |
        for group in request.user.groups.all():
            if group.name == "confidant-service":
                return {"principal_type": "service"}
        return {"principal_type": "user"}

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: confidant
    attrs:
      name: confidant
      client_type: public
      client_id: confidant
      authorization_flow: !Find
        - authentik_flows.flow
        - [slug, default-provider-authorization-explicit-consent]
      invalidation_flow: !Find
        - authentik_flows.flow
        - [slug, default-provider-invalidation-flow]
      redirect_uris:
        - url: http://localhost:3000/auth/callback
          matching_mode: strict
        - url: http://localhost/auth/callback
          matching_mode: strict
      signing_key: !Find
        - authentik_crypto.certificatekeypair
        - [name, "authentik Self-signed Certificate"]
      include_claims_in_id_token: true
      sub_mode: user_username
      property_mappings:
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "goauthentik.io/providers/oauth2/scope-openid"]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "goauthentik.io/providers/oauth2/scope-email"]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "goauthentik.io/providers/oauth2/scope-profile"]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "confidant.dev/providers/oauth2/scope-principal-type"]

  - model: authentik_core.application
    state: present
    identifiers:
      slug: confidant
    attrs:
      name: Confidant
      slug: confidant
      provider: !Find
        - authentik_providers_oauth2.oauth2provider
        - [name, confidant]
      policy_engine_mode: any
