default_language_version:
    python: python3
# Authentik blueprints use custom !Find tags that PyYAML cannot parse.
# Keep the generic YAML hook away from that directory and validate it via
# runtime tests instead.
exclude: '^(\.config/dev/authentik/blueprints/.*|docs/.*)$'
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: check-docstring-first
    -   id: check-executables-have-shebangs
    -   id: check-merge-conflict
    -   id: check-vcs-permalinks
    -   id: check-yaml
        args: [--allow-multiple-documents]
    -   id: debug-statements
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
    -   id: ruff
        args: [--fix]
    -   id: ruff-format
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
    -   id: mypy
        additional_dependencies:
        -   pydantic
        -   types-PyYAML
        -   types-requests
