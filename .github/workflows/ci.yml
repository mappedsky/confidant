name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-unit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run python unit tests
        run: make docker_test_unit

  test-integration:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run python integration tests
        run: make docker_test_integration

  test-frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Run frontend tests
        run: npm ci && npm run -s typecheck
